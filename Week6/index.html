<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WeatherOS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">

</head>

<body>

    <div id="loader">

        <div class="loader-circle"></div>

        <h2>WeatherOS</h2>

        <p>Loading weather data...</p>

    </div>

    <div class="bg">

        <div class="blob one"></div>

        <div class="blob two"></div>

        <div class="blob three"></div>

    </div>

    <main class="container">

        <header>

            <div class="logo">

                <div class="logo-circle"></div>

                <div>

                    <h2>WeatherOS</h2>

                    <span>Smart Weather Workspace</span>

                </div>

            </div>

            <div class="search-area">

                <input
                    id="cityInput"
                    type="text"
                    placeholder="Search city...">

                <button id="searchBtn">

                    Search

                </button>

                <button id="locationBtn">

                    My Location

                </button>

            </div>

        </header>

        <p id="errorMessage"></p>

        <section class="hero">

            <div class="weather-panel">

                <div class="weather-orb">

                    <img
                        id="weatherIcon"
                        src=""
                        alt="Weather Icon">

                </div>

                <h1 id="temperature">

                    --°C

                </h1>

                <h2 id="cityName">

                    Search a City

                </h2>

                <p id="description">

                    Weather Description

                </p>

            </div>

            <div class="stats">

                <div class="card">

                    <span>Humidity</span>

                    <h3 id="humidity">

                        --

                    </h3>

                </div>

                <div class="card">

                    <span>Wind</span>

                    <h3 id="wind">

                        --

                    </h3>

                </div>

                <div class="card">

                    <span>Pressure</span>

                    <h3 id="pressure">

                        --

                    </h3>

                </div>

                <div class="card">

                    <span>Visibility</span>

                    <h3 id="visibility">

                        --

                    </h3>

                </div>

                <div class="card">

                    <span>Sunrise</span>

                    <h3 id="sunrise">

                        --

                    </h3>

                </div>

                <div class="card">

                    <span>Sunset</span>

                    <h3 id="sunset">

                        --

                    </h3>

                </div>

            </div>

        </section>

        <section class="forecast-section">

            <div class="section-title">

                5 Day Forecast

            </div>

            <div
                id="forecastContainer"
                class="forecast">

            </div>

        </section>

        <section class="bottom-panels">

            <div class="panel">

                <div class="panel-header">

                    <h3>

                        Favorite Cities

                    </h3>

                    <button id="addFavorite">

                        +

                    </button>

                </div>

                <ul id="favoriteList">

                </ul>

            </div>

            <div class="panel">

                <div class="panel-header">

                    <h3>

                        Recent Searches

                    </h3>

                </div>

                <ul id="historyList">

                </ul>

            </div>

        </section>

    </main>

    <script src="js/storage.js"></script>

    <script src="js/api.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
